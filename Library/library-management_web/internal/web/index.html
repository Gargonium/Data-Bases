<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотечная система</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container mt-4">
    <!-- Форма логина -->
    <div id="loginForm" class="card mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <ul class="nav nav-tabs mb-3" id="authTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">Вход</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab">Регистрация</button>
                </li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                    <input type="text" id="login" class="form-control mb-2" placeholder="Логин">
                    <input type="password" id="password" class="form-control mb-2" placeholder="Пароль">
                    <button id="loginBtn" class="btn btn-primary w-100">Войти</button>
                    <div id="loginError" class="text-danger mt-2"></div>
                </div>
                <div class="tab-pane fade" id="register-pane" role="tabpanel">
                    <input type="text" id="regLogin" class="form-control mb-2" placeholder="Логин">
                    <input type="password" id="regPassword" class="form-control mb-2" placeholder="Пароль">
                    <select id="regRole" class="form-select mb-2">
                        <option value="reader">Читатель</option>
                        <option value="librarian">Библиотекарь</option>
                        <option value="admin">Администратор</option>
                    </select>
                    <button id="registerBtn" class="btn btn-success w-100">Зарегистрироваться</button>
                    <div id="registerError" class="text-danger mt-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Основной интерфейс (изначально скрыт) -->
    <div id="app" style="display: none;">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container-fluid">
                <span class="navbar-brand">Библиотека</span>
                <div class="navbar-nav me-auto" id="navMenu"></div>
                <button id="logoutBtn" class="btn btn-outline-light">Выйти</button>
            </div>
        </nav>
        <div id="content"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
